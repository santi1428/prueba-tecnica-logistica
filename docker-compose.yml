version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: logistics_db
    restart: always
    environment:
      POSTGRES_DB: logistics_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: logistics_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@logistics.com
      PGADMIN_DEFAULT_PASSWORD: 123456
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
